<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add to Attio</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Add to Attio</h1>
    </header>

    <!-- Auth Form (shown when not connected) -->
    <div id="auth-section" class="section hidden">
      <p class="description">Enter your Attio API key to get started.</p>
      <form id="auth-form">
        <div class="form-group">
          <label for="api-key">API Key</label>
          <input
            type="password"
            id="api-key"
            name="api-key"
            placeholder="attio_..."
            autocomplete="off"
            required
          />
        </div>
        <button type="submit" id="connect-btn" class="btn btn-primary">
          Connect
        </button>
      </form>
      <p class="help-text">
        <a href="https://attio.com/help/apps/other-apps/generating-an-api-key" target="_blank" rel="noopener">
          How to get your API key
        </a>
      </p>
    </div>

    <!-- Connected State (shown when authenticated) -->
    <div id="connected-section" class="section hidden">

      <!-- Loading state -->
      <div id="loading-state" class="hidden">
        <div class="loading-indicator">
          <span class="spinner"></span>
          <span>Checking Attio...</span>
        </div>
      </div>

      <!-- Not on profile page -->
      <div id="no-profile-state" class="hidden">
        <p class="description">Navigate to a LinkedIn, X, or Reddit profile to capture.</p>
        <hr />
        <button id="disconnect-btn-no-profile" class="btn btn-tertiary">
          Disconnect
        </button>
      </div>

      <!-- Profile detected state (new or existing) -->
      <div id="profile-state" class="hidden">

        <!-- Person Header Section -->
        <div class="person-header">
          <div class="person-avatar" id="person-avatar">
            <span class="avatar-placeholder">&#128100;</span>
            <img class="avatar-image hidden" id="avatar-image" alt="Profile" />
          </div>
          <div class="person-info">
            <div class="person-name-row">
              <a class="person-name" id="person-name"></a>
              <span class="attio-link-icon hidden" id="attio-link-icon" title="Open in Attio" aria-hidden="true">↗</span>
              <span class="status-badge" id="status-badge"></span>
            </div>
            <span class="person-role" id="person-role"></span>
            <span class="person-company" id="person-company"></span>
          </div>
        </div>

        <!-- Primary CTA Section -->
        <div class="cta-section">
          <!-- Add Person (new state) -->
          <button id="capture-btn" class="btn btn-primary btn-cta hidden">
            Add Person
          </button>

          <!-- Update (existing state) -->
          <button id="update-btn" class="btn btn-secondary hidden">
            Update Info
          </button>
        </div>

        <!-- Data Preview Section -->
        <div class="data-preview" id="data-preview">
          <div class="section-header">Data Available</div>
          <ul class="data-list" id="data-list">
            <!-- Populated by popup.ts -->
          </ul>
        </div>

        <!-- Object Mapping Section -->
        <div class="object-mapping">
          <div class="section-header">Attio Mapping</div>
          <div class="mapping-row">
            <span class="mapping-label">Person</span>
            <span class="mapping-arrow">&rarr;</span>
            <span class="mapping-value">People</span>
          </div>
        </div>

        <hr />

        <button id="disconnect-btn" class="btn btn-tertiary">
          Disconnect
        </button>
      </div>
    </div>

    <!-- Status Messages -->
    <div id="message" class="message hidden"></div>
  </div>

  <script src="popup.ts" type="module"></script>
</body>
</html>
