<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add to Attio</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 id="popup-title">Add to Attio</h1>
    </header>

    <!-- Auth Form (shown when not connected) -->
    <div id="auth-section" class="section hidden">
      <p class="description" id="auth-description">Enter your Attio API key to get started.</p>
      <form id="auth-form">
        <div class="form-group">
          <label for="api-key" id="api-key-label">API Key</label>
          <input
            type="password"
            id="api-key"
            name="api-key"
            placeholder="attio_..."
            autocomplete="off"
            required
          />
        </div>
        <button type="submit" id="connect-btn" class="btn btn-primary">
          Connect
        </button>
      </form>
      <p class="help-text">
        <a href="https://attio.com/help/apps/other-apps/generating-an-api-key" target="_blank" rel="noopener">
          <span id="api-key-help">How to get your API key</span>
        </a>
      </p>
    </div>

    <!-- Connected State (shown when authenticated) -->
    <div id="connected-section" class="section hidden">

      <!-- Loading state -->
      <div id="loading-state" class="hidden">
        <div class="loading-indicator">
          <span class="spinner"></span>
          <span id="loading-text">Checking Attio...</span>
        </div>
      </div>

      <!-- Not on profile page -->
      <div id="no-profile-state" class="hidden">
        <p class="description" id="no-profile-description">Navigate to a LinkedIn, X, or Reddit profile to capture.</p>
        <hr />
        <button id="disconnect-btn-no-profile" class="btn btn-tertiary">
          Disconnect
        </button>
      </div>

      <!-- Profile detected state (new or existing) -->
      <div id="profile-state" class="hidden">

        <!-- Header (primary interaction surface) -->
        <div class="person-header">
          <a class="person-link" id="person-link">
            <span class="person-name" id="person-name"></span>
            <span class="status-badge" id="status-badge"></span>
            <span class="attio-link-icon hidden" id="attio-link-icon" aria-hidden="true">↗</span>
          </a>
        </div>

        <!-- Core fields (static context) -->
        <div class="core-fields" id="core-fields">
          <div class="field-row">
            <span class="field-label" id="core-label-name">Name</span>
            <span class="field-value" id="core-value-name"></span>
          </div>
          <div class="field-row">
            <span class="field-label" id="core-label-linkedin">LinkedIn</span>
            <span class="field-value" id="core-value-linkedin"></span>
          </div>
        </div>

        <!-- State 1: New contact -->
        <div id="state-new" class="sheet-state hidden">
          <button id="save-btn" class="btn btn-primary btn-cta">Save to Attio</button>
        </div>

        <!-- State 2: Existing contact with differences -->
        <div id="state-diff" class="sheet-state hidden">
          <div class="diff-list" id="diff-list"></div>
          <button id="update-all-btn" class="btn btn-tertiary hidden">Update all</button>
        </div>

        <!-- State 3: Existing contact, no differences -->
        <div id="state-clean" class="sheet-state hidden">
          <!-- Contact summary for existing contacts -->
          <div class="contact-summary" id="contact-summary">
            <div class="contact-row" id="summary-email-row">
              <span class="contact-icon">✉</span>
              <span class="contact-value" id="summary-email-value"></span>
              <span class="contact-more hidden" id="summary-email-more"></span>
            </div>
            <div class="contact-row" id="summary-website-row">
              <span class="contact-icon">🔗</span>
              <span class="contact-value" id="summary-website-value"></span>
              <span class="contact-more hidden" id="summary-website-more"></span>
            </div>
            <div class="contact-row" id="summary-location-row">
              <span class="contact-icon">📍</span>
              <span class="contact-value" id="summary-location-value"></span>
            </div>
          </div>
          <div class="clean-status" id="up-to-date">Up to date ✓</div>
        </div>

        <hr />

        <button id="disconnect-btn" class="btn btn-tertiary">
          Disconnect
        </button>
      </div>
    </div>

    <!-- Status Messages -->
    <div id="message" class="message hidden"></div>
  </div>

  <script src="popup.ts" type="module"></script>
</body>
</html>
